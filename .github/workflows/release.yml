name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Version and publish to npm
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Read release version from tag
        id: release
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected a stable semver tag like v1.2.3, got ${TAG}."
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Update package version
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const packageJsonPath = 'package.json';
          const packageJson = JSON.parse(readFileSync(packageJsonPath, 'utf8'));
          packageJson.version = process.env.VERSION;
          writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, '\t')}\n`);
          NODE

      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
      - run: npm pack --dry-run

      - name: Commit version back to default branch
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if git diff --quiet -- package.json; then
            echo "package.json is already at ${VERSION}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${VERSION}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
