interface:
  display_name: "mal-ui (Windsurf)"
  short_description: "Build React/Next.js UIs with mal-ui, the MAL Devs component library."
  default_prompt: "Describe the UI or component you want to build with mal-ui (e.g. 'a login form with validation')."
skill:
  name: "mal-ui"
  entrypoint: "SKILL.md"
  references:
    - "references/setup.md"
    - "references/theme.md"
    - "references/core.md"
    - "references/hooks.md"
    - "references/form.md"
    - "references/charts.md"
    - "references/dates.md"
    - "references/notifications.md"
    - "references/modals.md"
    - "references/spotlight.md"
    - "references/code-highlight.md"
    - "references/tiptap.md"
    - "references/dropzone.md"
    - "references/carousel.md"
    - "references/nprogress.md"
    - "references/schedule.md"
    - "references/component-api.md"
  triggers:
    - "mal-ui"
    - "MALUIProvider"
    - "malTheme"
    - "mal-brand"
    - "import from mal-ui"
